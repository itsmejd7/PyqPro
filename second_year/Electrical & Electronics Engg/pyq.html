<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #E9F1FA;
        }

        .header {
            padding: 20px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: white;
            padding: 15px;
        }

        .name {
            color: black;
            font-size: 1rem;
            font-weight: bold;
            padding: 0px 14px;
            font-family: cursive;
        }
        .name a {
  text-decoration: none;
}

        .nav-links {
            display: none;
        }

        .nav-links.active {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: white;
            z-index: 999;
            padding: 10px 0;
            border-top: 1px solid #ccc;
        }

        .nav-links li {
            margin-right: 0;
            margin-bottom: 10px;
            text-align: center;
        }

        .nav-links a {
            color: #7E22CE;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ccc;
        }

        .menu-button {
            background-color: #7E22CE;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .menu-button:hover {
            background-color: #5D1A9F;
        }

        header {
            background-color: #E9F1FA;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .sname {
            color: #333;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .section {
            background-color: #fff;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            width: 80%;
            max-width: 600px;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .section h2 {
            color: #333;
            text-align: center;
        }

        .years {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }

        .years button {
            display: block;
            background-color: #00ABE4;
            color: #fff;
            border: none;
            padding: 15px 56px;
            text-decoration: none;
            font-size: 17px;
            cursor: pointer;
            border-radius: 11px;
            margin-bottom: 16px;
        }

        /* Media Query for Mobile Devices */
        @media screen and (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin-right: 0;
                margin-bottom: 10px;
                text-align: center;
            }

            .nav-links a {
                color: #7E22CE;
                text-decoration: none;
                transition: color 0.3s ease;
            }

            .nav-links a:hover {
                color: #ccc;
            }
        }
