<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #E9F1FA;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: white;
            padding: 15px;
        }

        .name {
            color: #7E22CE;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0px 14px;
            font-family: cursive;
        }
        .name a {
  text-decoration: none;
}

        .menu-button {
            background-color: #7E22CE;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .menu-button:hover {
            background-color: #5D1A9F;
        }

        .two-parts {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }

        .part {
            width: 45%;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .part h2 {
            text-align: center;
        }

        .box {
            background-color: #3498db;
            color: #fff;
            text-align: center;
            padding: 30px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .box a {
            text-decoration: none;
            color: #fff;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        @media screen and (max-width: 768px) {
            .two-parts {
                flex-direction: column;
                align-items: center;
            }

            .part {
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="name"><a href="#">PYQPRO</a></div>
        <button class="menu-button">Main Menu</button>
    </nav>

    <section class="two-parts">
        <div class="part">
            <h2>Semester 1</h2>
            <div class="box"><a href="math1/math1.html">Engineering Mathematics-I</a></div>
            <div class="box"><a href="#">Engineering Chemistry</a></div>
            <div class="box"><a href="#">Basic Electrical Engineering</a></div>
            <div class="box"><a href="#">Problem Solving and Programming</a></div>
            <div class="box"><a href="#">Systems in Mechanical Engineering</a></div>
        </div>
    
        <div class="part">
            <h2>Semester 2</h2>
            <div class="box"><a href="#">Engineering Mathematics-II</a></div>
            <div class="box"><a href="#">Engineering Physics</a></div>
            <div class="box"><a href="#">Basic Electronics Engineering</a></div>
            <div class="box"><a href="#">Engineering Mechanics</a></div>
            <div class="box"><a href="#">Engineering Graphics</a></div>
        </div>
    </section>
</body>
</html>
